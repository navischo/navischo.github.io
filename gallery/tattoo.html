<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Skin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="zen-dots-regular">
<h1 class="visually-hidden">Collection of tattoo by Yehor Navischo</h1>
<h2 class="title">
    <span class="collection">Currents</span>
    <b class="year">2025</b>
</h2>

<!-- Swiper -->
<div class="swiper mySwiper">
    <div class="swiper-wrapper">
    </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script type="module">
    "use strict";

    const parent = document.querySelector(".swiper-wrapper");
    const appendSheet = (imgId) => {
        const newSlide = document.createElement("div");
        const imgNode = document.createElement("img");
        newSlide.classList.add("swiper-slide");
        imgNode.src = `img/tattoo/${imgId}.jpg`;
        newSlide.appendChild(imgNode)
        parent.appendChild(newSlide);

    }

    for (let i = 1; i <= 110; i++) {
        appendSheet(i);
    }

    const swiper = new Swiper(".mySwiper", {
        navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",
        },
        pagination: {
            el: ".swiper-pagination",
            clickable: true,
            renderBullet: function (index, className) {
                if (index < 99) {
                    return '<span class="' + className + '">' + (index + 1) + "</span>";
                } else {
                    return '<span class="' + className + '" style="font-size: 7px">' + (index + 1) + "</span>";
                }
            },
        },
        loop: true,
    });
</script>
</body>

</html>
